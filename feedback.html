<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" type="text/css" href="feedback.css">
    <link rel="icon" type="image/x-icon" href="Sahil logo.png">
    <title>Sahil Shaikh - Feedback</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <div class="global-background">
        <i class="fas fa-server global-icon g-icon-1"></i>
        <i class="fas fa-database global-icon g-icon-2"></i>
        <i class="fas fa-cloud global-icon g-icon-3"></i>
        <i class="fas fa-lock global-icon g-icon-4"></i>
        <i class="fas fa-key global-icon g-icon-5"></i>
        <i class="fas fa-network-wired global-icon g-icon-6"></i>
        <i class="fas fa-microchip global-icon g-icon-7"></i>
        <i class="fas fa-robot global-icon g-icon-8"></i>
        <i class="fas fa-globe global-icon g-icon-9"></i>
        <i class="fas fa-bug global-icon g-icon-10"></i>
        <i class="fas fa-hashtag global-icon g-icon-11"></i>
        <i class="fas fa-project-diagram global-icon g-icon-12"></i>
        <i class="fas fa-file-code global-icon g-icon-13"></i>
        <i class="fas fa-search global-icon g-icon-14"></i>
        <i class="fas fa-brain global-icon g-icon-15"></i>
    </div>
    
    <header>
        <nav class="navigation">
            <a href="index.html" class="logo-link">
                <img class="logo" src="Sahil%20logo.png" alt="Sahil Shaikh Logo">
            </a>
            <input type="checkbox" id="check">
            <label for="check" class="checkbtn">
                <i class="fas fa-bars"></i>
            </label>
            <ul class="icons">
                <li><a href="index.html" class="list-group-item"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="index.html#container" class="list-group-item"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="index.html#edu" class="list-group-item"><i class="fas fa-pencil-alt"></i> Education</a></li>
                <li><a href="index.html#contact" class="list-group-item"><i class="fas fa-address-book"></i> Contact</a></li>
                <li><a href="feedback.html" class="active"><i class="fas fa-envelope"></i> Feedback</a></li>
                <li><a href="https://www.linkedin.com/in/sahil-shaikh-5b672a144/" class="list-group-item"><i class="fab fa-linkedin"></i> LinkedIn</a></li>
            </ul>
        </nav>
    </header>
    
    <main class="feedback-page">
        <div class="feedback-card">
            <h2>Share Your Feedback</h2>
            <p class="subtitle">I'd love to hear from you! Your feedback helps me improve.</p>
            
            <form action="https://formspree.io/f/xrewzzdj" method="POST">
                <div class="form-group">
                    <label for="name"><i class="fas fa-user"></i> Username*</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                
                <div class="form-group">
                    <label for="mail"><i class="fas fa-envelope"></i> E-mail*</label>
                    <input type="email" id="mail" name="email" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="phone"><i class="fas fa-phone"></i> Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="1234567890">
                </div>
                
                <div class="form-group">
                    <label for="message"><i class="fas fa-comment"></i> Message*</label>
                    <textarea id="message" name="message" rows="5" placeholder="Enter your valuable feedback here..." required></textarea>
                </div>
                
                <div class="form-note">
                    <i class="fas fa-check-circle"></i>
                    <span>By clicking Send, you agree to share your details with the admin</span>
                </div>
                
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Send Feedback
                </button>
                
                <a href="index.html" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </form>
        </div>
    </main>
</body>
</html>
